# Supabase local development configuration
# Run `supabase start` to spin up local Supabase stack
# Run `supabase functions deploy <function-name>` to deploy Edge Functions

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.sms]
enable_signup = true
enable_confirmations = true
# Handled by send-sms Edge Function hook — not configured here

[functions.register-shop]
enabled = true
verify_jwt = false  # called pre-login from the web registration page, no session yet
import_map = "./functions/register-shop/deno.json"
entrypoint = "./functions/register-shop/index.ts"

[functions.login]
enabled = true
verify_jwt = false  # phone+password login has no session/JWT to verify
import_map = "./functions/login/deno.json"
entrypoint = "./functions/login/index.ts"
