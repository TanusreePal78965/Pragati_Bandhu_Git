# Supabase local development configuration
# Run `supabase start` to spin up local Supabase stack
# Run `supabase functions deploy <function-name>` to deploy Edge Functions

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.sms]
enable_signup = true
enable_confirmations = true
# Handled by send-sms Edge Function hook — not configured here

[functions.send-sms]
verify_jwt = false  # Auth hook — called by Supabase internally, not by users

[functions.exchange-token]
enabled = true
verify_jwt = false
import_map = "./functions/exchange-token/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/exchange-token/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/exchange-token/*.html" ]
